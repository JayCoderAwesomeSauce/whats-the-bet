<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;700;900&family=Lora:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --cream: #FAF7F2;
    --black: #111111;
    --gold:  #C9A84C;
    --muted: #555555;
  }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: var(--cream);
    font-family: 'Inter', sans-serif;
    color: var(--black);
  }

  /* ── card shell ── */
  .card {
    width: 1200px;
    height: 630px;
    background: var(--cream);
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(201,168,76,0.18);
  }

  /* ── body: two-column row ── */
  .card-body {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 0 68px;
  }

  /* ── LEFT column ── */
  .card-left {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding-right: 60px;
    border-right: 1px solid rgba(201,168,76,0.25);
  }

  /* logo-group mirrors .cover-logo-group — inline-flex column so tagline
     centres under the logotype row naturally */
  .logo-group {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
  }

  /* ONE horizontal baseline-aligned row — mirrors .cover-logotype */
  .logotype {
    display: flex;
    align-items: baseline;
    gap: 8px;
    white-space: nowrap;
  }

  .logo-whats {
    font-family: 'Great Vibes', cursive;
    font-size: 70px;
    color: var(--black);
    line-height: 1;
  }

  .logo-bet {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    color: var(--gold);
    font-size: 52px;
    letter-spacing: 0.08em;
    line-height: 1;
    border-bottom: 2px solid var(--gold);
    padding-bottom: 3px;
  }

  /* tagline block below logotype */
  .tagline-block {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    width: 100%;
  }

  .tagline-rule {
    width: 28px;
    height: 1px;
    background: rgba(201,168,76,0.55);
  }

  .tagline-label {
    font-family: 'Inter', sans-serif;
    font-size: 10.5px;
    color: #aaaaaa;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  /* ── RIGHT column ── */
  .card-right {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-left: 60px;
    gap: 28px;
  }

  /* 3-dot vertical graphic — mirrors .cover-graphic */
  .dot-graphic {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
  }

  .node {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    background: transparent;
  }

  .node.filled { background: var(--gold); }

  .vline {
    width: 1px;
    height: 72px;
    background: rgba(201,168,76,0.38);
  }

  /* "3 startups. / 3 bets." — mirrors .cover-big-text */
  .big-text {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 52px;
    color: var(--black);
    line-height: 1.22;
    letter-spacing: -0.025em;
  }

  .big-text .gold { color: var(--gold); }

  /* ── footer ── */
  .card-footer {
    padding: 18px 68px;
    border-top: 1px solid rgba(201,168,76,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* mirrors .cover-value */
  .value-prop {
    font-family: 'Lora', serif;
    font-size: 17px;
    font-style: italic;
    color: var(--muted);
    text-align: center;
  }

  .value-prop .highlight {
    color: var(--gold);
    font-style: normal;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="card">

  <div class="card-body">

    <!-- LEFT: logotype lockup (single horizontal baseline row) -->
    <div class="card-left">
      <div class="logo-group">
        <div class="logotype">
          <span class="logo-whats">What's the</span>
          <span class="logo-bet">bet?</span>
        </div>
        <div class="tagline-block">
          <div class="tagline-rule"></div>
          <div class="tagline-label">Ecosystem Review &nbsp;·&nbsp; Every Week</div>
        </div>
      </div>
    </div>

    <!-- RIGHT: 3-dot graphic + "3 startups. / 3 bets." -->
    <div class="card-right">
      <div class="dot-graphic">
        <div class="node filled"></div>
        <div class="vline"></div>
        <div class="node"></div>
        <div class="vline"></div>
        <div class="node"></div>
      </div>
      <div class="big-text">
        3 startups.<br>
        <span class="gold">3 bets.</span>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="card-footer">
    <div class="value-prop">
      Where Indian startup funding gets a <span class="highlight">second opinion.</span>
    </div>
  </div>

</div>
</body>
</html>
